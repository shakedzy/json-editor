<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f8ff"/>
      <stop offset="100%" stop-color="#e9ecff"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#c7cbee"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="660" height="400" fill="url(#bg)"/>
  <rect width="660" height="400" fill="url(#dots)" opacity="0.5"/>

  <!-- Faint corner braces (decorative) -->
  <g opacity="0.10" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="36" fill="#3b3f80">
    <text x="28" y="62">{</text>
    <text x="610" y="370">}</text>
  </g>

  <!-- Title -->
  <g font-family="-apple-system, 'Helvetica Neue', sans-serif" fill="#1e2047">
    <text x="330" y="58" text-anchor="middle" font-size="22" font-weight="700">JSON<tspan fill="#6366f1" font-weight="800">++</tspan> Editor</text>
    <text x="330" y="82" text-anchor="middle" font-size="12" fill="#5b5f92">Drag the app into Applications to install</text>
  </g>

  <!-- Arrow: left slot → right slot. Icons are drawn by Finder on top of this background. -->
  <g stroke="#7a80bf" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 265 210 C 310 210 350 210 395 210" stroke-dasharray="5 5"/>
    <path d="M 386 200 L 397 210 L 386 220"/>
  </g>

  <!-- Footer hint -->
  <text x="330" y="362" text-anchor="middle"
        font-family="-apple-system, sans-serif" font-size="11" fill="#8e92c4">
    JSON · YAML · TOML · tree &amp; query · jq &amp; JSONPath
  </text>
</svg>
