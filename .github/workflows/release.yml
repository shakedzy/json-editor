name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0). Creates a draft release if one does not exist.'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            build-essential

      - name: Verify package.json version matches tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          PKG_VER=$(node -p "require('./package.json').version")
          if [ "v${PKG_VER}" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VER. Run 'npm version <x.y.z>' before tagging."
            exit 1
          fi
          echo "Tag $TAG matches package.json version $PKG_VER"

      - name: Setup JFrog Fly
        uses: jfrog/fly-action@v1

      - name: Install dependencies
        run: npm ci

      - name: Generate banner & DMG background PNGs
        run: node scripts/build-images.mjs

      # Ad-hoc signed on every OS (macOS uses `signingIdentity: "-"` from
      # tauri.conf.json, Windows/Linux don't sign). No APPLE_* env vars —
      # even passing them empty makes tauri-action attempt `security import`
      # on a blank cert and fail the job.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        # No tagName/releaseId → tauri-action only builds; the release job publishes.

      - name: Patch DMG (remove .VolumeIcon.icns, reposition .background)
        if: matrix.os == 'macos-latest'
        run: node scripts/patch-dmg.mjs

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: json-editor-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: ignore

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Setup JFrog Fly
        uses: jfrog/fly-action@v1

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      # Build a flat newline-separated list of uploadable files so that:
      #  • neither GitHub-release nor Fly upload patterns can match a
      #    directory (the Fly CLI can't checksum directories), and
      #  • we don't fail the release when, say, RPM or .sig files weren't
      #    produced (only the updater plugin emits .sig files; we don't use it).
      - name: Enumerate release files
        id: files
        run: |
          {
            echo 'list<<EOF'
            find artifacts -type f \( \
              -name '*.dmg' -o \
              -name '*.app.tar.gz' -o \
              -name '*.AppImage' -o \
              -name '*.deb' -o \
              -name '*.rpm' -o \
              -name '*.msi' -o \
              -name '*.exe' \
            \) | sort
            echo EOF
          } >> "$GITHUB_OUTPUT"
          echo "Files to publish:"
          find artifacts -type f \( \
            -name '*.dmg' -o \
            -name '*.app.tar.gz' -o \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name '*.rpm' -o \
            -name '*.msi' -o \
            -name '*.exe' \
          \) | sort

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          draft: true
          generate_release_notes: true
          # Comment the line below to detach the built binaries from the
          # GitHub Release page (they'd live only in Fly then).
          files: ${{ steps.files.outputs.list }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to JFrog Fly
        uses: jfrog/fly-action/upload@v1
        with:
          name: json-editor
          version: ${{ steps.tag.outputs.name }}
          files: ${{ steps.files.outputs.list }}
